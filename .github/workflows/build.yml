name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Build Release EXE
        run: cargo build --release

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini_stepmania_windows_exe
          path: target/release/mini_stepmania_rust.exe

  android-apk:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Platform 30
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-29" "build-tools;29.0.3" "platforms;android-30" "build-tools;30.0.3"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-quad-apk
        run: cargo install cargo-quad-apk --locked

      - name: Downgrade Lockfile Format For cargo-quad-apk
        run: |
          if [ -f Cargo.lock ]; then
            sed -i '0,/^version = 4$/s//version = 3/' Cargo.lock
          fi

      - name: NDK AR Compatibility Link
        run: |
          NDK_BIN="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          if [ ! -f "$NDK_BIN/arm-linux-androideabi-ar" ]; then
            ln -s "$NDK_BIN/llvm-ar" "$NDK_BIN/arm-linux-androideabi-ar"
          fi

      - name: Build Release APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          AR: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          TARGET_AR: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: cargo quad-apk build --release --target aarch64-linux-android

      - name: Decode And Sign APK (Optional Fixed Key)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No keystore secret configured; skip fixed-key signing."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          mapfile -t apks < <(find target -type f -name "*.apk")
          for apk in "${apks[@]}"; do
            out="${apk%.apk}-signed.apk"
            apksigner sign \
              --ks release.keystore \
              --ks-pass pass:$ANDROID_KEYSTORE_PASSWORD \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --key-pass pass:$ANDROID_KEY_PASSWORD \
              --out "$out" \
              "$apk"
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini_stepmania_android_apk
          path: |
            target/android-artifacts/release/apk/*.apk
            target/android-artifacts/aarch64-linux-android/release/apk/*.apk
            target/**/*-signed.apk
