name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release EXE
        run: cargo build --release

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini_stepmania_windows_exe
          path: target/release/mini_stepmania_rust.exe

  android-apk:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Build Release APK
        run: cargo apk build --release --target aarch64-linux-android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini_stepmania_android_apk
          path: |
            target/android-artifacts/release/apk/*.apk
            target/android-artifacts/aarch64-linux-android/release/apk/*.apk
