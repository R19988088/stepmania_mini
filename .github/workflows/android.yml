name: android

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  native-so:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build native .so (no Java)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: |
          cargo ndk -t arm64-v8a -o target/android-jniLibs build --release

      - name: Upload native libs
        uses: actions/upload-artifact@v4
        with:
          name: android-native-so
          path: target/android-jniLibs/**

  apk:
    runs-on: ubuntu-latest
    needs: native-so
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java (CI only)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-29" "build-tools;29.0.3" "ndk;25.2.9519653"

      - name: Install cargo-quad-apk
        run: cargo install cargo-quad-apk --locked

      - name: Add NDK tool aliases for cargo-quad-apk compatibility
        run: |
          NDK_BIN="/usr/local/lib/android/sdk/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x86_64/bin"
          cd "$NDK_BIN"
          ln -sf llvm-ar aarch64-linux-android-ar
          ln -sf ld.lld aarch64-linux-android-ld
          ln -sf llvm-readelf aarch64-linux-android-readelf
          ln -sf llvm-objcopy aarch64-linux-android-objcopy
          ln -sf llvm-strip aarch64-linux-android-strip
          ln -sf llvm-ranlib aarch64-linux-android-ranlib
          ln -sf llvm-nm aarch64-linux-android-nm
          ln -sf llvm-objdump aarch64-linux-android-objdump

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
          RUSTFLAGS: -Lnative=/usr/local/lib/android/sdk/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang/14.0.7/lib/linux/aarch64
        run: |
          cargo quad-apk build --release --target aarch64-linux-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: target/android-artifacts/release/apk/*.apk
